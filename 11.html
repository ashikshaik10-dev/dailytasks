    <h2>Registration Form</h2>

    <form>

        <label for="name">Full Name:</label><br>
        <input type="text" placeholder="Enter your Full Name" pattern="[A-Za-z]+" required>
        <br><br>

        <br><br>

        <br><br>

        <label for="password">Password:</label><br>

        <br><br>

        <label for="Mobile number"> Mobile Number</label><br>
        <input type="tel" pattern="[0-9] {10}"><br><br>

        <label for="Date">Date</label><br>
        <input type="date"><br><br>
        <textarea name="feedback" rows="10" cols="20">feedback</textarea>

        <label for="Gender">Gender</label><br><br>

        <input type="radio" name="gender">Female
