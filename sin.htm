<!DOCTYPE html>
<html>

<head>
    <title>Sign In Page</title>


</head>
<style>
    .sin {
        text-align: center;
        background-color: rgb(247, 242, 235);
    }

    h2 {
        text-align: center;
    }

    div {
        border: 50px;
        border-radius: 20px;
        background-color: rgb(200, 131, 40);


    }

    button:hover {
        background-color: rgb(242, 243, 236);


    }

    button {
        border-radius: 10px;
        background-color: rgb(118, 229, 254);
    }

    div {
        margin: 100px;
        box-shadow: 10px 10px 5px rgb(6, 6, 6);
    }

    h3 {
        text-align: center;
    }
</style>

<body>
    <h3>MIT SignIn </h3>
    <div>
        <h2>Sign In</h2>
        <section class="sin">
            <form action="./13.html">

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

                <label for="password">Password:</label><br>
                <input type="password" id="password" name="password" placeholder="Enter your password" required><br><br>

                <button type="submit">Sign In</button><br>
                <br>
                <a href="">Reset your password?</a>

            </form>
        </section>
    </div>
    <br><br>

    <footer align="center">
        <hr>

        <p>&copy; 2026 Massachusetts Institute of Technology (MIT). All Rights Reserved.</p>




    </footer>



</body>

</html>
