<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio and Video Tags</title>
    <link rel="stylesheet" href="style5.css">
</head>

<body>

    <h1 align="center">HTML Audio and Video Tags</h1>


    <section id="audio">

        <h2>Audio Section</h2>

        <div>
            <h3 class="one">1. Audio with Controls</h3>
            <audio controls>
                <source src="./audio/apple and pear.mp3" type="audio/mpeg">
                Your browser does not support the audio tag.
            </audio>
        </div>

        <hr>

        <div>
            <h3 class="one">2. Audio with Muted</h3>
            <audio controls muted>
                <source src="./audio/Be With You Lofi Triphop.mp3" type="audio/mpeg">
                Your browser does not support the audio tag.
            </audio>
        </div>

        <hr>

        <div>
            <h3 class="one">3. Audio with Loop</h3>
            <audio controls loop>
                <source src="./audio/Beautiful Chill Ambient.mp3" type="audio/mpeg">
                Your browser does not support the audio tag.
            </audio>
        </div>

        <hr>

        <div>
            <h3 class="one">4. Audio with Autoplay</h3>
            <audio controls autoplay muted>
                <source src="./audio/Calm Water Lofi Triphop.mp3" type="audio/mpeg">
                Your browser does not support the audio tag.
            </audio>
        </div>

    </section>

    <hr>


    <section id="video">

        <h2>Video Section</h2>

        <div>
            <h3 class="one">1. Video with audio</h3>

            <video controls width="300"
                src="./videos/SaveClip.App_AQMO1rE4SE9o43TZvuIqMktkvhnvfKygOdBqTlgNT7RXllTLckmT8cClilSpXFiqqCu7V2pB9xWTSCJageQ8e6dtygdnGhVG4pnEaRo.mp4"
                type="video/mp4">sample
                video</video>
        </div>

        <hr>

        <div>
            <h3 class="one">2. Video with muted</h3>
            <video width="400" controls muted>
                <source src="./videos/13351896_1920_1080_30fps.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <hr>

        <div>
            <h3 class="one">3. Video with Loop</h3>
            <video width="400" controls loop>
                <source src="./videos/16014808_3840_2160_60fps.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <hr>

        <div>
            <h3 class="one">4. Video with Autoplay</h3>
            <video width="400" controls autoplay muted>
                <source src="./videos/16301351_2560_1440_30fps.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

    </section>
    <footer id="foot">
        <p>&copy; 2026 AI World. All Rights Reserved.</p>
    </footer>

</body>

</html>
